<script src="data-api.js"></script>
<script>
    async async async function loadData() {

      const r_vision_data = await loadToolData('vision');
      const vision = r_vision_data.data || {};
      const r_biz_arch_data = await loadToolData('business-arch');
      const bizArch = r_biz_arch_data.data || {};
      const r_data_arch_data = await loadToolData('data-arch');
      const dataArch = r_data_arch_data.data || {};
      const r_app_arch_data = await loadToolData('app-arch');
      const appArch = r_app_arch_data.data || {};
      const r_tech_arch_data = await loadToolData('tech-arch');
      const techArch = r_tech_arch_data.data || {};
      return {vision, bizArch, dataArch, appArch, techArch};
    }

    function renderOverview() {
      const {vision, bizArch, dataArch, appArch} = loadData();
      document.getElementById('visionCount').textContent = vision.mission ? '1' : '0';
      document.getElementById('bizCount').textContent = (bizArch.domains || []).length || '0';
      document.getElementById('dataCount').textContent = (dataArch.items || []).length || '0';
      document.getElementById('appCount').textContent = (appArch.systems || []).length || '0';
    }

    function renderArchResults() {
      const {vision, bizArch, dataArch, appArch, techArch} = loadData();
      const hasData = vision.mission || (bizArch.domains || []).length > 0 || (dataArch.items || []).length > 0;
      
      if (!hasData) {
        document.getElementById('archResults').innerHTML = '<div class="empty-state">暂无架构设计数据，请先完成各架构模块的设计工作</div>';
        return;
      }

      let html = '<div class="section"><h4>转型愿景</h4>';
      if (vision.mission) {
        html += `<div class="arch-item"><h5>${vision.mission}</h5><p>${vision.vision || ''}</p></div>`;
      } else {
        html += '<p style="color:#64748b">待完善</p>';
      }
      html += '</div>';

      if ((bizArch.domains || []).length > 0) {
        html += '<div class="section"><h4>业务架构</h4>';
        (bizArch.domains || []).slice(0, 3).forEach(d => {
          html += `<div class="arch-item"><h5>${d.name}</h5><p>${d.desc || ''}</p></div>`;
        });
        html += '</div>';
      }

      if ((appArch.systems || []).length > 0) {
        html += '<div class="section"><h4>应用架构</h4>';
        (appArch.systems || []).slice(0, 3).forEach(s => {
          html += `<div class="arch-item"><h5><span class="arch-tag">${s.type || '应用'}</span>${s.name}</h5><p>${s.desc || ''}</p></div>`;
        });
        html += '</div>';
      }

      document.getElementById('archResults').innerHTML = html;
    }

    function exportDocx() {
      const content = generateReportContent();
      downloadText(content, '数字化转型总体规划报告.txt');
      showAlert('报告已导出（文本格式）', 'success');
    }

    function exportPptx() {
      const content = generateReportContent();
      downloadText(content, '数字化转型总体规划报告_简版.txt');
      showAlert('PPT大纲已导出', 'success');
    }

    function exportPdf() {
      window.print();
    }

    function generateReportContent() {
      const {vision, bizArch, dataArch, appArch, techArch} = loadData();
      let content = '数字化转型总体规划报告\n\n';
      content += '一、执行摘要\n\n';
      content += '1.1 项目背景\n基于企业数字化转型需求，制定本总体规划方案。\n\n';
      content += '1.2 架构愿景\n';
      if (vision.mission) {
        content += `使命：${vision.mission}\n`;
        content += `愿景：${vision.vision || ''}\n\n`;
      } else {
        content += '待完善\n\n';
      }

      content += '二、业务架构设计\n';
      (bizArch.domains || []).forEach((d, i) => {
        content += `${i + 1}. ${d.name}\n   ${d.desc || ''}\n`;
      });
      content += '\n三、数据架构设计\n';
      (dataArch.items || []).forEach((d, i) => {
        content += `${i + 1}. ${d.name}\n   类型：${d.type || ''} | 主数据：${d.master ? '是' : '否'}\n`;
      });
      content += '\n四、应用架构设计\n';
      (appArch.systems || []).forEach((s, i) => {
        content += `${i + 1}. ${s.name}（${s.type || ''}）\n   ${s.desc || ''}\n`;
      });
      return content;
    }

    function downloadText(text, filename) {
      const blob = new Blob([text], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    function showAlert(msg) {
      alert(msg);
    }

    renderOverview();
    renderArchResults();
  </script>
</body>
</html>
