<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诊断分析报告 - 数字化转型规划系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Microsoft YaHei',sans-serif;background:#f8fafc;color:#1e293b;line-height:1.6;padding:1.5rem}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #e2e8f0}
    h1{font-size:1.4rem;font-weight:700;color:#0f172a}
    .btn{padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;transition:all .2s}
    .btn-primary{background:#1a56db;color:#fff}
    .btn-primary:hover{background:#1e40af}
    .btn-outline{background:#fff;color:#1a56db;border:1.5px solid #1a56db}
    .btn-outline:hover{background:#eff6ff}
    .btn-sm{padding:.4rem .8rem;font-size:.8rem}
    .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.03)}
    .card h3{font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #e2e8f0}
    .score-card{display:inline-block;padding:1rem 1.5rem;background:linear-gradient(135deg,#1a56db,#6366f1);color:#fff;border-radius:12px;text-align:center;margin:.5rem}
    .score-card .value{font-size:2rem;font-weight:700}
    .score-card .label{font-size:.8rem;opacity:.9}
    .radar-container{width:100%;max-width:400px;margin:0 auto}
    .dimension-item{display:flex;align-items:center;padding:.75rem;background:#f8fafc;border-radius:8px;margin-bottom:.5rem}
    .dimension-item .name{flex:1;font-weight:500}
    .dimension-item .bar{flex:2;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
    .dimension-item .bar-fill{height:100%;background:#1a56db;border-radius:4px;transition:width .5s}
    .dimension-item .score{width:40px;text-align:right;font-weight:600;color:#1a56db}
    .section{margin-bottom:1.5rem}
    .section h4{font-size:.95rem;font-weight:600;color:#0f172a;margin-bottom:.75rem;padding-left:.75rem;border-left:3px solid #1a56db}
    .suggestion{background:#fff;border-radius:8px;padding:1rem;border-left:4px solid #22c55e;margin-bottom:.75rem}
    .suggestion h5{font-size:.9rem;font-weight:600;color:#166534;margin-bottom:.4rem}
    .suggestion p{font-size:.85rem;color:#475569}
    .alert{padding:1rem;border-radius:8px;margin-bottom:1rem;font-size:.9rem}
    .alert-info{background:#dbeafe;color:#1e40af}
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.85rem;font-weight:500;color:#475569;margin-bottom:.4rem}
    input,select,textarea{width:100%;padding:.65rem 1rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem}
    textarea{resize:vertical;min-height:80px}
  </style>
</head>
<body>
  <div class="page-header">
    <h1>📊 诊断分析报告</h1>
    <div>
      <button class="btn btn-outline btn-sm" onclick="exportReport()">📥 导出报告</button>
      <button class="btn btn-primary btn-sm" onclick="generateReport()">🔄 生成报告</button>
    </div>
  </div>

  <div class="card">
    <h3>数字化成熟度评分</h3>
    <div style="text-align:center;padding:1rem 0">
      <div class="score-card">
        <div class="value" id="totalScore">-</div>
        <div class="label">综合得分</div>
      </div>
      <div class="score-card" style="background:linear-gradient(135deg,#22c55e,#16a34a)">
        <div class="value" id="levelText">-</div>
        <div class="label">成熟度等级</div>
      </div>
    </div>
    <div id="dimensionsList"></div>
  </div>

  <div class="card">
    <h3>核心发现</h3>
    <div id="findingsList">
      <div class="alert alert-info">点击"生成报告"按钮，根据评估数据生成分析报告</div>
    </div>
  </div>

  <div class="card">
    <h3>改进建议</h3>
    <div id="suggestionsList"></div>
  </div>

  <script>
    function loadData() {
      const maturityData = JSON.parse(localStorage.getItem('maturity_data') || '{}');
      const dimensions = [
        {name: '战略规划', key: 'strategy', score: maturityData.strategy || 0},
        {name: '组织文化', key: 'culture', score: maturityData.culture || 0},
        {name: '技术基础', key: 'technology', score: maturityData.technology || 0},
        {name: '数据能力', key: 'data', score: maturityData.data || 0},
        {name: '业务流程', key: 'process', score: maturityData.process || 0},
        {name: '人才发展', key: 'talent', score: maturityData.talent || 0}
      ];
      return {dimensions, maturityData};
    }

    function calculateLevel(score) {
      if (score >= 4) return {text: '优化级', color: '#22c55e'};
      if (score >= 3) return {text: '规范级', color: '#1a56db'};
      if (score >= 2) return {text: '初始级', color: '#f59e0b'};
      return {text: '起步级', color: '#ef4444'};
    }

    function generateReport() {
      const {dimensions, maturityData} = loadData();
      const totalScore = dimensions.reduce((sum, d) => sum + d.score, 0) / dimensions.length;
      const level = calculateLevel(totalScore);

      document.getElementById('totalScore').textContent = totalScore.toFixed(1);
      document.getElementById('levelText').textContent = level.text;

      const list = document.getElementById('dimensionsList');
      list.innerHTML = dimensions.map(d => `
        <div class="dimension-item">
          <span class="name">${d.name}</span>
          <div class="bar"><div class="bar-fill" style="width:${d.score * 20}%"></div></div>
          <span class="score">${d.score.toFixed(1)}</span>
        </div>
      `).join('');

      const findings = [];
      dimensions.forEach(d => {
        if (d.score < 2.5) {
          findings.push({dimension: d.name, issue: '成熟度偏低，需要重点关注和提升', score: d.score});
        }
      });

      document.getElementById('findingsList').innerHTML = findings.length > 0 ?
        findings.map(f => `<div class="suggestion"><h5>${f.dimension}（${f.score.toFixed(1)}分）</h5><p>${f.issue}</p></div>`).join('') :
        '<div class="suggestion"><h5>✅ 整体表现良好</h5><p>各维度评分均达到中等以上水平</p></div>';

      document.getElementById('suggestionsList').innerHTML = `
        <div class="suggestion"><h5>📌 短期建议（0-6个月）</h5><p>完善数据采集和分析体系，建立数字化指标监控机制</p></div>
        <div class="suggestion"><h5>📌 中期建议（6-18个月）</h5><p>推进核心业务流程数字化改造，培养数字化人才队伍</p></div>
        <div class="suggestion"><h5>📌 长期建议（18个月以上）</h5><p>构建智能化运营能力，实现数据驱动的决策体系</p></div>
      `;
    }

    function exportReport() {
      const {dimensions} = loadData();
      let content = '数字化转型诊断分析报告\n\n';
      content += '一、评估维度得分\n';
      dimensions.forEach(d => {
        content += `${d.name}：${d.score.toFixed(1)}分\n`;
      });
      content += '\n二、核心发现\n';
      content += '基于评估结果，企业数字化转型处于发展阶段，需持续投入和优化。\n';
      content += '\n三、改进建议\n';
      content += '1. 完善数据基础设施\n2. 培养数字化人才\n3. 优化业务流程\n4. 强化技术创新\n';
      downloadText(content, '诊断分析报告.txt');
    }

    function downloadText(text, filename) {
      const blob = new Blob([text], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    generateReport();
  </script>
</body>
</html>
