<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战略目标 - 数字化转型规划系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Microsoft YaHei',sans-serif;background:#f8fafc;color:#1e293b;line-height:1.6;padding:1.5rem}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #e2e8f0}
    h1{font-size:1.4rem;font-weight:700;color:#0f172a}
    .btn{padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;transition:all .2s}
    .btn-primary{background:#1a56db;color:#fff}
    .btn-primary:hover{background:#1e40af}
    .btn-outline{background:#fff;color:#1a56db;border:1.5px solid #1a56db}
    .btn-outline:hover{background:#eff6ff}
    .btn-sm{padding:.4rem .8rem;font-size:.8rem}
    .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:1.25rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.03)}
    .card h3{font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #e2e8f0}
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.85rem;font-weight:500;color:#475569;margin-bottom:.4rem}
    input,select,textarea{width:100%;padding:.65rem 1rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#1a56db}
    textarea{resize:vertical;min-height:100px}
    table{width:100%;border-collapse:collapse;margin-top:1rem}
    th,td{padding:.75rem;text-align:left;border-bottom:1px solid #e2e8f0;font-size:.85rem}
    th{background:#f8fafc;font-weight:600;color:#475569}
    tr:hover td{background:#f8fafc}
    .action-btns{display:flex;gap:.5rem}
    .tag{display:inline-block;padding:.25rem .6rem;border-radius:20px;font-size:.75rem;background:#eff6ff;color:#1a56db}
    .alert{padding:1rem;border-radius:8px;margin-bottom:1rem;font-size:.9rem}
    .alert-success{background:#dcfce7;color:#166534}
    .alert-error{background:#fee2e2;color:#991b1b}
    .empty-state{text-align:center;padding:3rem;color:#64748b}
    .empty-state .icon{font-size:3rem;margin-bottom:1rem}
    .goal-card{background:#fff;border-radius:10px;padding:1rem 1.25rem;margin-bottom:.75rem;border-left:4px solid #1a56db;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .goal-card .level{display:inline-block;font-size:.7rem;padding:.15rem .5rem;border-radius:4px;margin-bottom:.5rem}
    .level-1{background:#dbeafe;color:#1e40af}
    .level-2{background:#dcfce7;color:#166534}
    .level-3{background:#fef3c7;color:#92400e}
    .goal-card h4{font-size:.95rem;font-weight:600;color:#0f172a;margin-bottom:.4rem}
    .goal-card p{font-size:.85rem;color:#64748b}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1rem}
    .metric{text-align:center;padding:1rem;background:#f8fafc;border-radius:8px}
    .metric .value{font-size:1.5rem;font-weight:700;color:#1a56db}
    .metric .label{font-size:.75rem;color:#64748b;margin-top:.25rem}
  </style>
</head>
<body>
  <div class="page-header">
    <h1>📌 战略目标设定</h1>
    <div>
      <button class="btn btn-outline btn-sm" onclick="exportGoals()">📥 导出</button>
      <button class="btn btn-primary btn-sm" onclick="showAddGoal()">+ 添加目标</button>
    </div>
  </div>

  <div id="alertBox"></div>

  <div class="card">
    <h3>目标概览</h3>
    <div class="metrics">
      <div class="metric">
        <div class="value" id="totalGoals">0</div>
        <div class="label">目标总数</div>
      </div>
      <div class="metric">
        <div class="value" id="level1Goals">0</div>
        <div class="label">战略层目标</div>
      </div>
      <div class="metric">
        <div class="value" id="level2Goals">0</div>
        <div class="label">战术层目标</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>目标列表</h3>
    <div id="goalsList">
      <div class="empty-state">
        <div class="icon">🎯</div>
        <p>暂无目标，请点击"添加目标"创建</p>
      </div>
    </div>
  </div>

  <!-- 添加目标弹窗 -->
  <div id="goalModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
    <div style="background:#fff;padding:1.5rem;border-radius:12px;width:90%;max-width:500px">
      <h3 style="font-size:1.1rem;margin-bottom:1rem">添加战略目标</h3>
      <div class="form-group">
        <label>目标层级</label>
        <select id="goalLevel">
          <option value="1">战略层目标（公司级）</option>
          <option value="2">战术层目标（部门级）</option>
          <option value="3">执行层目标（岗位级）</option>
        </select>
      </div>
      <div class="form-group">
        <label>目标名称</label>
        <input type="text" id="goalName" placeholder="输入目标名称">
      </div>
      <div class="form-group">
        <label>目标描述</label>
        <textarea id="goalDesc" placeholder="描述目标的具体内容和期望成果"></textarea>
      </div>
      <div class="form-group">
        <label>衡量指标（KPI）</label>
        <input type="text" id="goalKpi" placeholder="如：客户满意度提升至95%">
      </div>
      <div class="form-group">
        <label>目标年份</label>
        <select id="goalYear">
          <option value="2026">2026年</option>
          <option value="2027">2027年</option>
          <option value="2028">2028年</option>
          <option value="2029">2029年</option>
          <option value="2030">2030年</option>
        </select>
      </div>
      <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem">
        <button class="btn btn-outline" onclick="closeGoalModal()">取消</button>
        <button class="btn btn-primary" onclick="saveGoal()">保存</button>
      </div>
    </div>
  </div>

  <script>
    let goals = JSON.parse(localStorage.getItem('strategic_goals') || '[]');

    function renderGoals() {
      const list = document.getElementById('goalsList');
      if (goals.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><p>暂无目标，请点击"添加目标"创建</p></div>';
        return;
      }
      list.innerHTML = goals.map((g, i) => `
        <div class="goal-card">
          <span class="level level-${g.level}">${g.level === 1 ? '战略层' : g.level === 2 ? '战术层' : '执行层'}</span>
          <h4>${g.name}</h4>
          <p>${g.desc || ''}</p>
          <p style="margin-top:.5rem"><strong>指标：</strong>${g.kpi || '-'}</p>
          <p><strong>年份：</strong>${g.year}年</p>
          <div style="margin-top:.75rem">
            <button class="btn btn-outline btn-sm" onclick="editGoal(${i})">编辑</button>
            <button class="btn btn-outline btn-sm" style="color:#dc2626" onclick="deleteGoal(${i})">删除</button>
          </div>
        </div>
      `).join('');

      document.getElementById('totalGoals').textContent = goals.length;
      document.getElementById('level1Goals').textContent = goals.filter(g => g.level === 1).length;
      document.getElementById('level2Goals').textContent = goals.filter(g => g.level === 2).length;
    }

    function showAddGoal() {
      document.getElementById('goalModal').style.display = 'flex';
      document.getElementById('goalName').value = '';
      document.getElementById('goalDesc').value = '';
      document.getElementById('goalKpi').value = '';
    }

    function closeGoalModal() {
      document.getElementById('goalModal').style.display = 'none';
    }

    function saveGoal() {
      const name = document.getElementById('goalName').value.trim();
      if (!name) { alert('请输入目标名称'); return; }
      goals.push({
        level: document.getElementById('goalLevel').value,
        name: name,
        desc: document.getElementById('goalDesc').value,
        kpi: document.getElementById('goalKpi').value,
        year: document.getElementById('goalYear').value
      });
      localStorage.setItem('strategic_goals', JSON.stringify(goals));
      renderGoals();
      closeGoalModal();
      showAlert('目标添加成功', 'success');
    }

    function editGoal(index) {
      const g = goals[index];
      document.getElementById('goalModal').style.display = 'flex';
      document.getElementById('goalLevel').value = g.level;
      document.getElementById('goalName').value = g.name;
      document.getElementById('goalDesc').value = g.desc;
      document.getElementById('goalKpi').value = g.kpi;
      document.getElementById('goalYear').value = g.year;
      goals.splice(index, 1);
    }

    function deleteGoal(index) {
      if (confirm('确定删除此目标？')) {
        goals.splice(index, 1);
        localStorage.setItem('strategic_goals', JSON.stringify(goals));
        renderGoals();
        showAlert('目标已删除', 'success');
      }
    }

    function exportGoals() {
      if (goals.length === 0) { showAlert('暂无数据可导出', 'error'); return; }
      let content = '战略目标清单\n\n';
      goals.forEach(g => {
        content += `【${g.level === 1 ? '战略层' : g.level === 2 ? '战术层' : '执行层'}】${g.name}\n`;
        content += `描述：${g.desc || '-'}\n`;
        content += `KPI：${g.kpi || '-'}\n`;
        content += `年份：${g.year}年\n\n`;
      });
      downloadText(content, '战略目标清单.txt');
    }

    function downloadText(text, filename) {
      const blob = new Blob([text], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => box.innerHTML = '', 3000);
    }

    renderGoals();
  </script>
</body>
</html>
