<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可编辑项目名 · 优先级矩阵 (原点单0)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef3f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 36px;
            box-shadow: 0 24px 50px -20px #1f4b66;
            padding: 28px 30px;
        }
        h2 {
            margin: 0 0 8px 0;
            font-weight: 650;
            color: #093f55;
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }
        .info-tag {
            background: #cbe3f2;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 400;
            color: #0a4b68;
        }
        .matrix-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin: 24px 0 20px;
        }
        .canvas-box {
            background: #ffffff;
            border-radius: 30px;
            padding: 18px 16px 10px 16px;
            border: 1px solid #cde0ed;
            box-shadow: 0 6px 18px rgba(0,45,70,0.02);
            flex: 1 1 400px;
        }
        .canvas-box h3 {
            margin: 0 0 10px 12px;
            font-weight: 500;
            color: #1d5c7a;
            display: flex;
            gap: 30px;
            font-size: 1rem;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #fcfdff;
            border-radius: 22px;
            border: 1px solid #bdd2e3;
        }
        .legend-bar {
            background: #e9f2f9;
            border-radius: 50px;
            padding: 10px 22px;
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px 32px;
            font-size: 0.86rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .editor-panel {
            flex: 2 1 540px;
            background: #f7fbfe;
            border-radius: 30px;
            border: 1px solid #c7ddec;
            padding: 22px 24px;
        }
        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .editor-header h3 {
            margin: 0;
            font-weight: 500;
            color: #175a78;
        }
        .project-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .project-card {
            background: white;
            border-radius: 70px;
            padding: 8px 18px 8px 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 14px;
            border: 1px solid #bad2e6;
            box-shadow: 0 3px 10px rgba(28,70,100,0.03);
        }
        .project-name-input {
            border: 1px solid #c4d5e3;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 600;
            color: #104e6b;
            background: white;
            width: 130px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.1s;
        }
        .project-name-input:focus {
            border-color: #3b8db5;
            box-shadow: 0 0 0 3px rgba(45,140,190,0.15);
        }
        .coord-group {
            display: flex;
            align-items: center;
            background: #e8f1f8;
            border-radius: 40px;
            padding: 4px 10px 4px 16px;
            gap: 6px;
        }
        .coord-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #1b6685;
            text-transform: uppercase;
        }
        .coord-group input {
            width: 80px;
            background: white;
            border: 1px solid #afc8da;
            border-radius: 30px;
            padding: 8px 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            color: #0a3d54;
            outline: none;
        }
        .coord-group input:focus {
            border-color: #3083a8;
            box-shadow: 0 0 0 3px rgba(38,125,170,0.1);
        }
        .delete-btn {
            background: none;
            border: 1px solid #e0b2b2;
            color: #b15757;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: auto;
            transition: 0.1s;
        }
        .delete-btn:hover {
            background: #ffebeb;
            border-color: #bf6b6b;
            color: #a13535;
        }
        .add-btn {
            background: white;
            border: 2px dashed #7aaec9;
            color: #196987;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 22px;
            cursor: pointer;
            width: fit-content;
        }
        .add-btn:hover {
            background: #d8ecfa;
            border: 2px solid #3c8db5;
        }
        .priority-section {
            margin-top: 32px;
            border-top: 2px solid #c1d9ec;
            padding-top: 18px;
        }
        .priority-section h3 {
            font-weight: 650;
            color: #0f4a64;
            margin: 0 0 16px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0,35,55,0.06);
        }
        th {
            background: #b4d4ea;
            color: #043f55;
            font-weight: 600;
            padding: 16px 14px;
            font-size: 0.9rem;
            text-align: left;
        }
        td {
            padding: 14px 14px;
            border-bottom: 1px solid #d0e2f0;
            color: #124d69;
        }
        .score-chip {
            background: #13648b;
            color: white;
            font-weight: 700;
            padding: 6px 20px;
            border-radius: 60px;
            display: inline-block;
            font-size: 0.9rem;
        }
        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #688a9e;
            text-align: right;
        }
        input[type=number]::-webkit-inner-spin-button {
            opacity: 0.6;
            height: 24px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h2>
        ✏️ 完全可编辑项目 · 优先级矩阵
        <span class="info-tag">步长0.1 · 原点单0 · 总分=紧迫+重要</span>
    </h2>

    <div class="matrix-row">
        <!-- 画布区 -->
        <div class="canvas-box">
            <h3><span>⚡ 紧迫性 (x 0→3)</span><span>🎯 重要性 (y 0→3)</span></h3>
            <canvas id="matrixCanvas" width="400" height="400"></canvas>
            <div class="legend-bar" id="canvasLegend"></div>
        </div>

        <!-- 编辑器区 (项目名可编辑) -->
        <div class="editor-panel">
            <div class="editor-header">
                <h3>📝 点击项目名或数值直接修改</h3>
            </div>
            <div id="projectEditor" class="project-cards">
                <!-- 动态生成卡片 -->
            </div>
            <button class="add-btn" id="addProjectBtn">➕ 添加新项目</button>
        </div>
    </div>

    <!-- 优先级表格 -->
    <div class="priority-section">
        <h3>📊 建设顺序 (高分优先)</h3>
        <table id="priorityTable">
            <thead><tr><th>排名</th><th>项目</th><th>紧迫性</th><th>重要性</th><th>总分</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="footer-note">✔ 双击/编辑项目名、坐标值，矩阵与表格实时联动 | 原点处仅显示一个“0”</div>
</div>

<script>
    (function() {
        // ---------- 项目数据 ----------
        let projects = [
            { id: 101, name: 'Alpha', urgency: 1.2, importance: 2.4 },
            { id: 102, name: 'Beta', urgency: 2.9, importance: 1.1 },
            { id: 103, name: 'Gamma', urgency: 2.0, importance: 2.8 },
            { id: 104, name: 'Delta', urgency: 0.6, importance: 1.3 },
        ];
        let nextId = 200;

        // DOM 元素
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const editorDiv = document.getElementById('projectEditor');
        const tableBody = document.getElementById('tableBody');
        const legendDiv = document.getElementById('canvasLegend');
        const addBtn = document.getElementById('addProjectBtn');

        // 辅助: 保留一位小数
        const fmt = (v) => v.toFixed(1);

        // ---------- 主渲染 ----------
        function renderAll() {
            renderEditorCards();
            renderPriorityTable();
            drawMatrix();
            renderLegend();
        }

        // ---------- 绘制矩阵 (原点只显示一个0) ----------
        function drawMatrix() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height;
            const margin = 40;
            const axisWidth = w - 2 * margin;   // 320
            const unit = axisWidth / 3;           // 每单位长度

            // 网格线 (整数)
            ctx.strokeStyle = '#c7d9e8';
            ctx.lineWidth = 0.8;
            for (let i = 0; i <= 3; i++) {
                const x = margin + i * unit;
                const y = margin + i * unit;
                ctx.beginPath();
                ctx.moveTo(x, margin);
                ctx.lineTo(x, h - margin);
                ctx.strokeStyle = '#d2e0eb';
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(margin, y);
                ctx.lineTo(w - margin, y);
                ctx.stroke();
            }

            // 坐标轴
            ctx.beginPath();
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = '#1f6080';
            ctx.moveTo(margin-2, h-margin);
            ctx.lineTo(w-margin+8, h-margin);
            ctx.moveTo(margin, h-margin+2);
            ctx.lineTo(margin, margin-8);
            ctx.stroke();

            // 刻度标签 0,1,2,3   (原点处只保留一个0)
            ctx.font = 'bold 13px "Segoe UI", monospace';
            ctx.fillStyle = '#10445b';
            for (let i = 0; i <= 3; i++) {
                const x = margin + i * unit;
                const y = h - margin;
                const yLabel = margin + (3 - i) * unit;  // 对应Y轴坐标：i=0时在最下面

                // X轴刻度全部绘制 (包含0)
                ctx.fillText(i.toString(), x-6, y+18);

                // Y轴刻度：跳过0，避免原点处出现两个0
                if (i !== 0) {
                    ctx.fillText(i.toString(), margin-26, yLabel+4);
                }
            }

            // 轴文字
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = '#185e7c';
            ctx.fillText('紧迫性 →', w-100, h-12);
            ctx.save();
            ctx.translate(22, 90);
            ctx.rotate(-Math.PI/2);
            ctx.fillText('重要性 ↑', 0, 0);
            ctx.restore();

            if (projects.length === 0) return;

            // 偏移量避免重叠
            const offsets = [
                [0,0],[14,8],[-10,14],[16,-8],[-14,-10],[8,-16],[-18,6],[10,-10],[-6,14],[12,12]
            ];

            projects.forEach((proj, idx) => {
                const u = proj.urgency;
                const imp = proj.importance;
                const baseX = margin + u * unit;
                const baseY = h - margin - imp * unit;

                const [dx, dy] = offsets[idx % offsets.length];
                const finalX = baseX + dx;
                const finalY = baseY + dy;

                const hue = (proj.id * 31) % 360;
                ctx.beginPath();
                ctx.arc(finalX, finalY, 16, 0, 2*Math.PI);
                ctx.fillStyle = `hsl(${hue}, 70%, 65%)`;
                ctx.shadowColor = 'rgba(0,40,60,0.25)';
                ctx.shadowBlur = 7;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2.8;
                ctx.stroke();

                ctx.font = 'bold 14px "Segoe UI", monospace';
                ctx.fillStyle = '#001e2e';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(proj.id % 100, finalX, finalY-1);
            });
        }

        // ---------- 图例 (显示项目名+坐标) ----------
        function renderLegend() {
            let html = '';
            projects.forEach(p => {
                const hue = (p.id * 31) % 360;
                html += `<div class="legend-item">
                    <span class="dot" style="background: hsl(${hue},70%,65%);">${p.id%100}</span>
                    <span>${p.name} (${fmt(p.urgency)}, ${fmt(p.importance)})</span>
                </div>`;
            });
            legendDiv.innerHTML = html || '<span>暂无项目，请添加</span>';
        }

        // ---------- 编辑器卡片 (包含可编辑项目名) ----------
        function renderEditorCards() {
            let html = '';
            projects.forEach(proj => {
                html += `
                    <div class="project-card" data-id="${proj.id}">
                        <input type="text" class="project-name-input" data-id="${proj.id}" value="${proj.name.replace(/"/g, '&quot;')}" placeholder="项目名">
                        <div class="coord-group">
                            <label>⚡紧</label>
                            <input type="number" min="0" max="3" step="0.1" value="${fmt(proj.urgency)}" class="urgency-input" data-id="${proj.id}" data-field="urgency">
                        </div>
                        <div class="coord-group">
                            <label>🎯重</label>
                            <input type="number" min="0" max="3" step="0.1" value="${fmt(proj.importance)}" class="importance-input" data-id="${proj.id}" data-field="importance">
                        </div>
                        <button class="delete-btn" data-id="${proj.id}" data-action="delete">✕</button>
                    </div>
                `;
            });
            editorDiv.innerHTML = html;
        }

        // ---------- 优先级表格 ----------
        function renderPriorityTable() {
            if (projects.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:32px;">点击“添加新项目”开始</td></tr>';
                return;
            }
            const sorted = [...projects].sort((a,b) => {
                const sa = a.urgency + a.importance;
                const sb = b.urgency + b.importance;
                return sb - sa || a.id - b.id;
            });
            let rows = '';
            sorted.forEach((p, i) => {
                const total = p.urgency + p.importance;
                rows += `<tr>
                    <td><strong>#${i+1}</strong></td>
                    <td>${p.name}</td>
                    <td>${fmt(p.urgency)}</td>
                    <td>${fmt(p.importance)}</td>
                    <td><span class="score-chip">${fmt(total)}</span></td>
                </tr>`;
            });
            tableBody.innerHTML = rows;
        }

        // ---------- 事件代理 (处理所有输入: 项目名, 坐标, 删除, 添加) ----------
        function setupEvents() {
            // 监听所有更改事件 (input 实时, change 保底)
            editorDiv.addEventListener('input', function(e) {
                const target = e.target;
                // 项目名输入
                if (target.classList.contains('project-name-input')) {
                    const projectId = parseInt(target.getAttribute('data-id'));
                    const newName = target.value.trim() || '未命名';
                    const project = projects.find(p => p.id === projectId);
                    if (project) {
                        project.name = newName;
                        renderLegend();
                        renderPriorityTable();
                        drawMatrix();  // 矩阵不变但图例已更新，仍可调用
                    }
                }
                // 坐标输入实时更新
                if (target.classList.contains('urgency-input') || target.classList.contains('importance-input')) {
                    const projectId = parseInt(target.getAttribute('data-id'));
                    const field = target.getAttribute('data-field');
                    let raw = parseFloat(target.value);
                    if (isNaN(raw)) raw = 0.0;
                    raw = Math.min(3.0, Math.max(0.0, raw));
                    raw = Math.round(raw * 10) / 10;
                    target.value = raw.toFixed(1);  // 强制格式

                    const project = projects.find(p => p.id === projectId);
                    if (project) {
                        if (field === 'urgency') project.urgency = raw;
                        else project.importance = raw;
                        // 实时更新绘图和图例/表格
                        drawMatrix();
                        renderLegend();
                        renderPriorityTable();
                    }
                }
            });

            // 使用 change 事件作为补充
            editorDiv.addEventListener('change', function(e) {
                const target = e.target;
                if (target.classList.contains('project-name-input')) {
                    const projectId = parseInt(target.getAttribute('data-id'));
                    const newName = target.value.trim() || '未命名';
                    const project = projects.find(p => p.id === projectId);
                    if (project && project.name !== newName) {
                        project.name = newName;
                        renderLegend();
                        renderPriorityTable();
                        drawMatrix();
                    }
                }
                if (target.classList.contains('urgency-input') || target.classList.contains('importance-input')) {
                    const projectId = parseInt(target.getAttribute('data-id'));
                    const field = target.getAttribute('data-field');
                    let raw = parseFloat(target.value);
                    if (isNaN(raw)) raw = 0.0;
                    raw = Math.min(3.0, Math.max(0.0, raw));
                    raw = Math.round(raw * 10) / 10;
                    target.value = raw.toFixed(1);
                    const project = projects.find(p => p.id === projectId);
                    if (project) {
                        if (field === 'urgency') project.urgency = raw;
                        else project.importance = raw;
                        drawMatrix();
                        renderLegend();
                        renderPriorityTable();
                    }
                }
            });

            // 删除按钮
            editorDiv.addEventListener('click', function(e) {
                const delBtn = e.target.closest('[data-action="delete"]');
                if (delBtn) {
                    const projectId = parseInt(delBtn.getAttribute('data-id'));
                    projects = projects.filter(p => p.id !== projectId);
                    renderAll();  // 重新绘制全部
                }
            });

            // 添加项目
            addBtn.addEventListener('click', function() {
                const newId = nextId++;
                const baseName = `项目${String.fromCharCode(65 + (projects.length % 26))}${projects.length+1}`;
                projects.push({
                    id: newId,
                    name: baseName,
                    urgency: 0.0,
                    importance: 0.0
                });
                renderAll();
            });
        }

        // 初始化渲染和事件
        renderAll();
        setupEvents();
    })();
</script>
</body>
</html>
