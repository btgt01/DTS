<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统集成关系 - 企业数字化转型规划系统</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-dark: #1e40af;
      --secondary: #6366f1;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --white: #ffffff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --border: #e5e7eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: var(--gray-800); line-height: 1.6; }
    
    .header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 1.5rem 2rem; }
    .header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .header p { opacity: 0.9; font-size: 0.9rem; }
    
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    
    .card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 1.5rem; overflow: hidden; }
    .card-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--gray-50); display: flex; justify-content: space-between; align-items: center; }
    .card-header h2 { font-size: 1.1rem; color: var(--primary); font-weight: 600; }
    .card-body { padding: 1.5rem; }
    
    .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    
    /* 系统节点 */
    .systems-section { margin-bottom: 2rem; }
    .systems-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; }
    .system-node { display: flex; align-items: center; gap: 0.5rem; background: var(--gray-50); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; }
    .system-node input { border: none; background: none; font-size: 0.9rem; width: 120px; }
    .system-node input:focus { outline: none; }
    .system-node .delete-btn { color: var(--gray-400); cursor: pointer; font-size: 0.85rem; }
    .system-node .delete-btn:hover { color: var(--danger); }
    
    /* 集成关系 */
    .integration-list { display: grid; gap: 1rem; }
    .integration-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--gray-50); border-radius: 8px; border: 1px solid var(--border); }
    .integration-item .system { background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 500; min-width: 100px; text-align: center; }
    .integration-item .arrow { color: var(--primary); font-size: 1.5rem; }
    .integration-item select { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; width: 120px; }
    .integration-item input { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; flex: 1; }
    .integration-item .delete-btn { color: var(--gray-400); cursor: pointer; font-size: 1.2rem; }
    .integration-item .delete-btn:hover { color: var(--danger); }
    
    /* 策略说明 */
    .strategy-section textarea { width: 100%; min-height: 120px; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; resize: vertical; }
    
    /* 可视化 */
    .visualization { background: var(--gray-50); border-radius: 8px; padding: 2rem; margin-top: 1.5rem; min-height: 300px; position: relative; }
    .center-hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; text-align: center; box-shadow: 0 4px 20px rgba(26,86,219,0.3); }
    .satellite { position: absolute; width: 80px; height: 80px; background: var(--white); border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; text-align: center; box-shadow: var(--shadow); }
    
    .export-section { text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    
    @media (max-width: 768px) {
      .integration-item { flex-wrap: wrap; }
      .center-hub { width: 100px; height: 100px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔗 系统集成关系</h1>
    <p>设计各系统间的集成架构和数据流向</p>
  </div>
  
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>系统清单</h2>
        <button class="btn btn-primary btn-sm" onclick="addSystem()">+ 添加系统</button>
      </div>
      <div class="card-body">
        <div class="systems-section">
          <p style="color: var(--gray-500); font-size: 0.9rem; margin-bottom: 0.5rem;">添加需要集成的系统：</p>
          <div class="systems-grid" id="systemsGrid">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <h2>集成关系</h2>
        <div>
          <button class="btn btn-secondary btn-sm" onclick="loadFromStorage()">📂 加载</button>
          <button class="btn btn-primary btn-sm" onclick="saveToStorage()">💾 保存</button>
          <button class="btn btn-primary btn-sm" onclick="addIntegration()">+ 添加集成</button>
        </div>
      </div>
      <div class="card-body">
        <div class="integration-list" id="integrationList">
          <!-- 动态生成 -->
        </div>
        
        <div class="visualization" id="visualization">
          <div class="center-hub">数据中台<br>核心枢纽</div>
          <!-- 动态生成卫星节点 -->
        </div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <h2>集成策略说明</h2>
      </div>
      <div class="card-body">
        <textarea id="strategy" placeholder="描述系统集成的整体策略，如：&#10;- 采用API网关统一对外服务&#10;- 使用消息队列实现异步解耦&#10;- 建立ESB企业服务总线...">采用API网关统一对外服务，通过消息队列实现异步解耦，建立ESB企业服务总线进行服务编排与协议转换，确保各系统间数据流畅通。</textarea>
      </div>
    </div>
    
    <div class="export-section">
      <button class="btn btn-primary" onclick="exportWord()">📥 导出Word</button>
    </div>
  </div>
  
  <script src="data-api.js"></script>
<script>
    let systems = ['ERP', 'MES', 'CRM', 'SCM', 'WMS', 'PLM'];
    let integrations = [
      { from: 'ERP', to: '数据中台', type: '数据同步' },
      { from: 'MES', to: '数据中台', type: '数据同步' },
      { from: 'CRM', to: '数据中台', type: '数据同步' }
    ];
    
    function renderSystems() {
      const grid = document.getElementById('systemsGrid');
      grid.innerHTML = systems.map((s, i) => `
        <div class="system-node">
          <span>${s}</span>
          <input type="text" value="${s}" onchange="updateSystem(${i}, this.value)">
          <span class="delete-btn" onclick="deleteSystem(${i})">×</span>
        </div>
      `).join('');
      renderVisualization();
    }
    
    function addSystem() {
      const name = prompt('输入系统名称（如：HR系统）：');
      if (name && !systems.includes(name)) {
        systems.push(name);
        renderSystems();
      }
    }
    
    function updateSystem(index, value) {
      systems[index] = value;
      renderSystems();
    }
    
    function deleteSystem(index) {
      systems.splice(index, 1);
      renderSystems();
    }
    
    function renderIntegrations() {
      const list = document.getElementById('integrationList');
      if (integrations.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: var(--gray-500); padding: 2rem;">暂无集成关系，请点击"添加集成"开始设计</p>';
        return;
      }
      
      list.innerHTML = integrations.map((int, i) => `
        <div class="integration-item">
          <select class="system" onchange="updateIntegration(${i}, 'from', this.value)">
            ${systems.map(s => `<option value="${s}" ${int.from === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
          <span class="arrow">⟷</span>
          <select class="system" onchange="updateIntegration(${i}, 'to', this.value)">
            ${systems.map(s => `<option value="${s}" ${int.to === s ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
          <select onchange="updateIntegration(${i}, 'type', this.value)">
            <option value="数据同步" ${int.type === '数据同步' ? 'selected' : ''}>数据同步</option>
            <option value="API调用" ${int.type === 'API调用' ? 'selected' : ''}>API调用</option>
            <option value="消息队列" ${int.type === '消息队列' ? 'selected' : ''}>消息队列</option>
            <option value="文件传输" ${int.type === '文件传输' ? 'selected' : ''}>文件传输</option>
          </select>
          <span class="delete-btn" onclick="deleteIntegration(${i})">🗑️</span>
        </div>
      `).join('');
    }
    
    function addIntegration() {
      if (systems.length < 2) {
        alert('请先添加至少2个系统');
        return;
      }
      integrations.push({ from: systems[0], to: systems[1], type: '数据同步' });
      renderIntegrations();
    }
    
    function updateIntegration(index, field, value) {
      integrations[index][field] = value;
      renderIntegrations();
    }
    
    function deleteIntegration(index) {
      integrations.splice(index, 1);
      renderIntegrations();
    }
    
    function renderVisualization() {
      const viz = document.getElementById('visualization');
      const connectedSystems = new Set();
      integrations.forEach(int => {
        connectedSystems.add(int.from);
        connectedSystems.add(int.to);
      });
      
      // 移除旧的卫星节点
      viz.querySelectorAll('.satellite').forEach(n => n.remove());
      
      // 添加新的卫星节点
      const positions = [
        { top: '10%', left: '15%' },
        { top: '10%', right: '15%' },
        { top: '40%', left: '5%' },
        { top: '40%', right: '5%' },
        { top: '70%', left: '15%' },
        { top: '70%', right: '15%' },
        { top: '85%', left: '40%' },
        { top: '85%', right: '40%' }
      ];
      
      let posIndex = 0;
      connectedSystems.forEach(sys => {
        if (posIndex < positions.length) {
          const pos = positions[posIndex];
          const div = document.createElement('div');
          div.className = 'satellite';
          div.textContent = sys;
          div.style.top = pos.top || 'auto';
          div.style.left = pos.left || 'auto';
          div.style.right = pos.right || 'auto';
          div.style.bottom = pos.bottom || 'auto';
          viz.appendChild(div);
          posIndex++;
        }
      });
    }
    
    async function saveToStorage() {
      const data = { systems, integrations, strategy: document.getElementById('strategy').value };
      await saveToolData('integration', data);
      alert('✅ 集成关系已保存');
    }
    
    async function loadFromStorage() {
      const result = await loadToolData('integration');
      if (result && result.data) {
        const data = result.data;
        systems = data.systems || systems;
        integrations = data.integrations || integrations;
        document.getElementById('strategy').value = data.strategy || '';
        renderSystems();
        renderIntegrations();
        alert('✅ 已加载草稿');
      } else {
        alert('没有找到保存的草稿');
      }
    }
    
    function exportWord() {
      var docx = '\uFEFF<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n';
      docx += '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">\n<w:body>\n';
      docx += '<w:p><w:r><w:rPr><w:b/><w:sz w:val="40"/></w:rPr><w:t>系统集成关系设计</w:t></w:r></w:p>\n';
      docx += '<w:p><w:r><w:rPr><w:color w:val="888888"/></w:rPr><w:t>生成日期：' + new Date().toLocaleDateString('zh-CN') + '</w:t></w:r></w:p>\n';
      
      docx += '<w:p><w:r><w:rPr><w:b/><w:sz w:val="28"/></w:rPr><w:t>一、系统清单</w:t></w:r></w:p>\n';
      docx += '<w:p><w:r><w:t>' + systems.join('、') + '</w:t></w:r></w:p>\n';
      
      docx += '<w:p><w:r><w:rPr><w:b/><w:sz w:val="28"/></w:rPr><w:t>二、集成关系</w:t></w:r></w:p>\n';
      integrations.forEach(int => {
        docx += '<w:p><w:r><w:t>' + int.from + ' ⟷ ' + int.to + ' (' + int.type + ')</w:t></w:r></w:p>\n';
      });
      
      docx += '<w:p><w:r><w:rPr><w:b/><w:sz w:val="28"/></w:rPr><w:t>三、集成策略</w:t></w:r></w:p>\n';
      docx += '<w:p><w:r><w:t>' + document.getElementById('strategy').value + '</w:t></w:r></w:p>\n';
      
      docx += '</w:body></w:document>';
      
      var blob = new Blob([docx], {type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '系统集成关系设计.docx';
      a.click();
    }
    
    renderSystems();
    renderIntegrations();
  </script>
</body>
</html>
